version: '3.8'

services:
  jupysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupysql-lab
    ports:
      - "8888:8888"
    volumes:
      # Mount a local directory for notebooks
      - ./notebooks:/workspace
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8888/jupysql/connections', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # Development version with live source mounts
  jupysql-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupysql-lab-dev
    ports:
      - "8889:8888"
    volumes:
      - ./notebooks:/workspace
      - ./src:/app/src
      - ./jupysql_labextension/src:/app/jupysql_labextension/src
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --watch
      --NotebookApp.token=''
      --NotebookApp.password=''
    restart: unless-stopped

  # Selenium test runner - runs against the jupysql service
  selenium-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: jupysql-selenium-tests
    depends_on:
      jupysql:
        condition: service_healthy
    environment:
      - JUPYTERLAB_URL=http://jupysql:8888
    restart: "no"
