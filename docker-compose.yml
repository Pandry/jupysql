version: '3.8'

services:
  jupysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupysql-lab
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/workspace
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.disable_check_xsrf=True
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8888/jupysql/connections', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # PostgreSQL instance used by the test suite
  postgres-test:
    image: docker.io/library/postgres:16-alpine
    container_name: jupysql-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Selenium + HTTP test runner
  selenium-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: jupysql-selenium-tests
    depends_on:
      jupysql:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    environment:
      - JUPYTERLAB_URL=http://jupysql:8888
      - POSTGRES_TEST_HOST=postgres-test
      - POSTGRES_TEST_PORT=5432
      - POSTGRES_TEST_USER=postgres
      - POSTGRES_TEST_PASSWORD=postgres
      - POSTGRES_TEST_DB=testdb
    restart: "no"
